<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sparkling Wines Club</title>
    <meta name="description" content="Discover 50 sparkling wine and cocktail recipes with ingredients and serving tips. Browse curated articles on champagne, prosecco, and cava." />
    <link rel="canonical" href="https://www.sparklingwines.club/" />
    <meta name="theme-color" content="#775537" />
    <meta name="apple-mobile-web-app-title" content="Sparkling Wines Club" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sparkling Wines Club" />
    <meta property="og:title" content="Sparkling Wines Club" />
    <meta property="og:description" content="Discover 50 sparkling wine and cocktail recipes with ingredients and serving tips. Browse curated articles on champagne, prosecco, and cava." />
    <meta property="og:url" content="https://www.sparklingwines.club/" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Sparkling Wines Club" />
    <meta name="twitter:description" content="Discover 50 sparkling wine and cocktail recipes with ingredients and serving tips." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Mr+Dafoe&display=swap" rel="stylesheet">

    <!-- JSON-LD: Organization + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Sparkling Wines Club",
          "url": "https://www.sparklingwines.club/",
          "logo": "https://www.sparklingwines.club/favicon.svg",
          "description": "Curated sparkling wine and cocktail recipes with serving tips and educational articles."
        },
        {
          "@type": "WebSite",
          "name": "Sparkling Wines Club",
          "url": "https://www.sparklingwines.club/",
          "inLanguage": "en",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.sparklingwines.club/?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
